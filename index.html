<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Hasaballa AI PECS
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="./css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>

Hasaballa AI PECS

</h1>

</div>

<!-- DASHBOARD -->

<div class="cards">

<div class="card">
<h3>إجمالي المهام</h3>
<div id="totalTasks" class="value">0</div>
</div>

<div class="card">
<h3>تم تنفيذها</h3>
<div id="completedTasks" class="value">0</div>
</div>

<div class="card">
<h3>قيد التنفيذ</h3>
<div id="inProgressTasks" class="value">0</div>
</div>

<div class="card">
<h3>المتبقي</h3>
<div id="remainingTasks" class="value">0</div>
</div>

</div>

<!-- FILTERS -->

<div class="section">

<div class="section-title">

Project Filters

</div>

<div class="filters">

<input
type="text"
id="searchBox"
placeholder="بحث عن مهمة...">

<select id="phaseFilter">
<option value="">
كل المراحل
</option>
</select>

<select id="milestoneFilter">
<option value="">
كل الـ Milestones
</option>
</select>

<select id="developerFilter">
<option value="">
كل المطورين
</option>
</select>

<select id="taskTypeFilter">
<option value="">
كل أنواع المهام
</option>
</select>

</div>

</div>

<!-- TASKS -->

<div class="section">

<div class="section-title">

Developer Tasks ↔ Reference Tasks ↔ Master Tasks

</div>

<div class="table-wrapper">

<table id="tasksTable">

<thead>

<tr>

<th>✓</th>
<th>المهمة</th>
<th>نوع المهمة</th>
<th>Reference</th>
<th>Master</th>
<th>Phase</th>
<th>Milestone</th>
<th>Week</th>
<th>Developer</th>
<th>Status</th>
<th>Progress</th>
<th>Subtasks</th>
<th>Notes</th>

</tr>

</thead>

<tbody id="tasksBody">

</tbody>

</table>

</div>

</div>

<!-- WEEKLY REPORTS -->

<div class="section">

<div class="section-title">

Weekly Reports

</div>

<div id="weeklyReports">

</div>

</div>

<!-- DAILY REPORTS -->

<div class="section">

<div class="section-title">

Daily Reports

</div>

<div id="dailyReports">

</div>

</div>

</div>

<script src="./js/app.js"></script>

</body>

</html>
