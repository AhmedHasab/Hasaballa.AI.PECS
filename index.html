<style>

:root{

--primary:#071733;
--secondary:#0c244f;

--success:#22c55e;

--danger:#ef4444;

--border:#d7dbe2;
--bg:#f3f4f6;

--completed:#e5e7eb;

--shadow:
0 2px 10px rgba(0,0,0,.08);

*{
margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:var(--bg);

padding:20px;

direction:rtl;

}

.container{

max-width:1900px;

margin:auto;

}

.header{

background:linear-gradient(
90deg,
var(--primary),
var(--secondary)
);

color:#fff;

padding:18px;

border-radius:12px;

margin-bottom:20px;

box-shadow:var(--shadow);

}

.header h1{

font-size:34px;

font-weight:800;

}

.cards{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:15px;

margin-bottom:20px;

}

.card{

background:white;

border-radius:12px;

padding:25px;

box-shadow:var(--shadow);

text-align:center;

}

.card h3{

font-size:18px;

margin-bottom:10px;

}

.card .value{

font-size:42px;

font-weight:800;

}

.section{

background:white;

padding:20px;

border-radius:12px;

box-shadow:var(--shadow);

margin-bottom:20px;

}

.section-title{

font-weight:800;

margin-bottom:15px;

}

.filters{

display:grid;

grid-template-columns:
repeat(5,1fr);

gap:12px;

margin-bottom:20px;

}

.filters select,
.filters input{

padding:10px;

border:1px solid #ccc;

border-radius:8px;

font-size:14px;

}

.table-wrapper{

overflow-x:auto;

}

table{

width:100%;

border-collapse:collapse;

min-width:1800px;

}

thead{

background:var(--primary);

color:white;

}

th{

padding:14px;

border:1px solid #16335e;

font-size:14px;

}

td{

padding:12px;

border:1px solid var(--border);

vertical-align:top;

font-size:13px;

}

tr.completed{

background:var(--completed);

border:3px solid var(--completed-border);

}

.progress{

height:22px;

background:#e5e7eb;

border-radius:30px;

overflow:hidden;

}

.progress-bar{

height:100%;

background:var(--success);

text-align:center;

color:white;

font-size:12px;

font-weight:700;

}

.subtask{

background:#f8fafc;

border-right:4px solid #2563eb;

padding:8px;

margin:4px 0;

border-radius:6px;

font-size:12px;

}

.milestone{

background:#ede9fe;

padding:6px 10px;

border-radius:6px;

display:inline-block;

font-size:12px;

font-weight:700;

}

.phase{

background:#dbeafe;

padding:6px 10px;

border-radius:6px;

display:inline-block;

font-size:12px;

font-weight:700;

}

textarea{

width:100%;

min-height:60px;

padding:8px;

.developer-select{

width:100%;

padding:8px;

}

.expand-btn{

cursor:pointer;

font-weight:700;

color:#2563eb;

}

.report-card{

background:white;

padding:15px;

margin-bottom:10px;

border-radius:10px;

border:1px solid #ddd;

}

.hidden{

display:none;

.cards{

grid-template-columns:
repeat(2,1fr);

.filters{

grid-template-columns:

<script>

const SUPABASE_URL =
"https://oivtndqstklnsxwherpp.supabase.co";

const SUPABASE_KEY =

window.supabase.createClient(

async function loadData(){

const [
tasksRes,
subtasksRes,
masterRes,
mappingRes,
phaseRes,
milestoneRes,
reportsRes,
developersRes

] = await Promise.all([

fetch('./data/tasks.json'),
fetch('./data/subtasks.json'),
fetch('./data/master_tasks.json'),
fetch('./data/mappings.json'),
fetch('./data/phases.json'),
fetch('./data/milestones.json'),
fetch('./data/reports.json'),
fetch('./data/developers.json')

]);

tasks =
await tasksRes.json();

subtasks =
await subtasksRes.json();

masterTasks =
await masterRes.json();

mappings =
await mappingRes.json();

phases =
await phaseRes.json();

milestones =
await milestoneRes.json();

reports =
await reportsRes.json();

developers =
await developersRes.json();

populateFilters();

}

function populateFilters(){

const phaseFilter =
document.getElementById(
'phaseFilter'
);

const milestoneFilter =
document.getElementById(
'milestoneFilter'
);

const taskTypeFilter =
document.getElementById(
'taskTypeFilter'
);

masterTasks.forEach(task=>{

taskTypeFilter.innerHTML +=
`
<option value="${task.task_type}">
${task.task_type}
</option>
`;

});

phases
.filter(
p=>p.id &&
p.id.startsWith('P')
)
.forEach(phase=>{

phaseFilter.innerHTML +=
`
<option value="${phase.id}">
${phase.id}
</option>
`;

});

milestones.forEach(ms=>{

milestoneFilter.innerHTML +=
`
<option value="${ms.id}">
${ms.id}
</option>
`;

});

}

// =====================================
// PART 3
// LOAD + RELATION ENGINE
// =====================================

function getMappingByDeveloperTask(devId){

return mappings.find(
m => m.developer_task_id === devId
);

}

function getMasterTask(masterId){

return masterTasks.find(
m => m.id === masterId
);

}

function getSubtasks(masterId){

return subtasks.filter(
s => s.parent_task === masterId
);

}

function getMilestone(id){

return milestones.find(
m => m.id === id
);

}

function getPhase(id){

return phases.find(
p => p.id === id
);

}

// =====================================
// DASHBOARD
// =====================================

function renderDashboard(){

const total =
masterTasks.length;

let completed = 0;

masterTasks.forEach(task=>{

const related =
getSubtasks(task.id);

if(
related.length > 0 &&
related.every(
s=>s.status==="Completed"
)
){

completed++;

}

});

const inProgress =
tasks.filter(
t =>
t.status ===
'In Progress'
).length;

const remaining =
total - completed;

document.getElementById(
'totalTasks'
).innerText =
total;

document.getElementById(
'completedTasks'
).innerText =
completed;

document.getElementById(
'inProgressTasks'
).innerText =
inProgress;

document.getElementById(
'remainingTasks'
).innerText =
remaining;

}

// =====================================
// MASTER TASKS TABLE
// =====================================

function renderTasks(){

const tbody =
document.getElementById(
'tasksBody'
);

tbody.innerHTML='';

masterTasks.forEach(master=>{

const relatedSubtasks =
getSubtasks(master.id);

const mapping =
mappings.find(
m =>
m.reference_task_id ===
master.id
);

let progress = 0;

if(
relatedSubtasks.length > 0
){

const done =
relatedSubtasks.filter(
s =>
s.status ===
'Completed'
).length;

progress =
Math.round(
(done /
relatedSubtasks.length)
*100
);

}

const row =
document.createElement(
'tr'
);

if(progress===100){

row.classList.add(
'completed'
);

}

row.innerHTML = `

<td>

<input
type="checkbox"
class="master-check"
data-id="${master.id}"
${progress===100 ? 'checked':''}
>

</td>

<td>

<b>
${master.title}
</b>

<br>

<small>
${master.id}
</small>

</td>

<td>

${master.task_type}

</td>

<td>

${master.reference_task}

</td>

<td>

${master.id}

</td>

<td>

<span class="phase">

${master.phase}

</span>

</td>

<td>

<span class="milestone">

${findMilestoneForTask(master)}

</span>

</td>

<td>

${master.week_start}
-
${master.week_end}

</td>

<td>

<select
class="developer-select"
>

<option>Rini</option>
<option>Dhruvi</option>
<option>Charvina</option>
<option>Parth</option>
<option>Others</option>

</select>

</td>

<td>

${progress===100
?
'Completed'
:
'Pending'
}

</td>

<td>

<div class="progress">

<div
class="progress-bar"
style="width:${progress}%"
>

${progress}%

</div>

</div>

</td>

<td>

<div
id="sub-${master.id}"
>

${renderSubtaskList(
relatedSubtasks
)}

</div>

</td>

<td>

<textarea
data-id="${master.id}"
>

</textarea>

</td>

`;

tbody.appendChild(
row
);

});

}

// =====================================
// SUBTASK HTML
// =====================================

function renderSubtaskList(items){

let html='';

items.forEach(sub=>{

html += `

<div class="subtask">

<input
type="checkbox"
class="subtask-check"
data-id="${sub.id}"
${sub.status==="Completed"
?
'checked'
:
''
}
>

<b>

${sub.title}

</b>

<br>

${sub.task_type}

<br>

${sub.reference}

</div>

`;

});

return html;

}

// =====================================
// MILESTONE AUTO DETECTION
// =====================================

function findMilestoneForTask(task){

const phase =
task.phase;

const milestone =
phases.find(
p =>
p.id === phase
);

if(
milestone &&
milestone.milestone
){

return milestone.milestone;

}

return '-';

}

// EVENTS + PROGRESS + LOCAL STORAGE
// =====================================

let notesStore = {};

let developerStore = {};

const STORAGE_KEY =
'hasaballa_pecs_v1';

function attachEvents(){

// =====================================
// SUBTASK CHECKBOX
// =====================================

document
.querySelectorAll('.subtask-check')
.forEach(box=>{

box.addEventListener(
'change',
function(){

const id =
this.dataset.id;

const sub =
subtasks.find(
s=>s.id===id
);

if(!sub)
return;

if(this.checked){

sub.status =
'Completed';

}
else{

const answer =
confirm(
'هل أنت متأكد من إلغاء الإنجاز ؟'
);

if(!answer){

this.checked = true;

return;

}

sub.status =
'Pending';

}

saveLocalState();

renderDashboard();

renderTasks();

attachEvents();

restoreNotes();

restoreDevelopers();

}

);

});

});

// =====================================
// MASTER TASK CHECKBOX
// =====================================

document
.querySelectorAll('.master-check')
.forEach(box=>{

box.addEventListener(
'change',
function(){

const masterId =
this.dataset.id;

const related =
subtasks.filter(
s =>
s.parent_task ===
masterId
);

if(this.checked){

related.forEach(sub=>{

sub.status =
'Completed';

});

}
else{

const answer =
confirm(
'هل أنت متأكد من إلغاء المهمة بالكامل ؟'
);

this.checked = true;

related.forEach(sub=>{

});

renderDashboard();

renderTasks();

attachEvents();

restoreNotes();

restoreDevelopers();

}

});

});

document

}

// =====================================
// SAVE LOCAL
// =====================================

function saveLocalState(){

const state = {

subtasks,
notesStore,
developerStore

};

localStorage.setItem(

STORAGE_KEY,

JSON.stringify(
state
)

);

}

// =====================================
// LOAD LOCAL
// =====================================

function loadLocalState(){

const saved =
localStorage.getItem(
STORAGE_KEY
);

if(!saved)
return;

try{

const state =
JSON.parse(saved);

if(state.subtasks){

subtasks =
state.subtasks;

}

if(state.notesStore){

notesStore =
state.notesStore;

}

if(state.developerStore){

developerStore =
state.developerStore;

}

}
catch(error){

console.error(
error
);

}

}
// =====================================

// RESTORE + SUPABASE
// =====================================

function restoreNotes(){

Object.keys(
notesStore
).forEach(id=>{

const area =
document.querySelector(

`textarea[data-id="${id}"]`

);

if(area){

area.value =
notesStore[id];

}

});

}

function restoreDevelopers(){

Object.keys(
developerStore
).forEach(id=>{

const select =
document.querySelector(

`tr:has(.master-check[data-id="${id}"]) .developer-select`

);

if(select){

select.value =
developerStore[id];

}

});

}

// SUPABASE SAVE

try{

await supabase
.from('project_state')
.upsert([

{

id:1,

data:{

subtasks,
notesStore,
developerStore

},

updated_at:
new Date()
.toISOString()

}

]);

}
catch(error){

console.error(
error
);

}

}

error

=
await supabase

data.data.developerStore
){

error

// =====================================
// MASTER TASK PROGRESS
// =====================================

function calculateMasterProgress(
masterId
){

const related =
subtasks.filter(
s =>
s.parent_task ===
masterId
);

if(
related.length === 0
)
return 0;

const completed =
related.filter(
s =>
s.status ===
'Completed'
).length;

return Math.round(
(
completed /
related.length
)
*100
);

}

// =====================================
// TASK STATUS
// =====================================

function getTaskStatus(
masterId
){

const progress =
calculateMasterProgress(
masterId
);

if(progress === 100)
return 'Completed';

if(progress > 0)
return 'In Progress';

return 'Pending';

}

// =====================================
// PART 7
// SUPABASE ENGINE
// =====================================

const SUPABASE_TABLE =
'project_state';

// =====================================
// SAVE TO SUPABASE
// =====================================

async function saveToSupabase(){

try{

const payload = {

id:1,

subtasks,

notesStore,

developerStore,

updated_at:
new Date()
.toISOString()

};

const {
error
}
=
await supabase

.from(
SUPABASE_TABLE
)

.upsert(
payload
);

if(error){

console.error(
'Supabase Save Error',
error
);

}

}
catch(error){

console.error(
error
);

}

}

// =====================================
// LOAD FROM SUPABASE
// =====================================

async function loadFromSupabase(){

try{

const {

data,
error

}
=
await supabase

.from(
SUPABASE_TABLE
)

.select('*')

.eq(
'id',
1
)

.single();

if(error){

console.warn(
'No Saved State Found'
);

return;

}

if(!data)
return;

if(data.subtasks){

subtasks =
data.subtasks;

}

if(data.notesStore){

notesStore =
data.notesStore;

}

if(data.developerStore){

developerStore =
data.developerStore;

}

}
catch(error){

console.error(
error
);

}

}

// =====================================
// STATUS SUMMARY
// =====================================

function buildSummary(){

const summary = {

total:
masterTasks.length,

completed:
masterTasks.filter(
task=>

calculateMasterProgress(
task.id
) === 100

).length,

inProgress:
masterTasks.filter(
task=>{

const p =
calculateMasterProgress(
task.id
);

return p>0 && p<100;

}
).length

};

return summary;

}

}
