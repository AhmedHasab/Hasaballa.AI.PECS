<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hasaballa AI PECS</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#111827;
    color:white;
    padding:20px;
}

h1{
    margin:0;
}

.container{
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.number{
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
}

.section{
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:right;
}

th{
    background:#111827;
    color:white;
}

</style>
</head>

<body>

<header>
    <h1>Hasaballa AI PECS</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<div>إجمالي المهام</div>
<div class="number">0</div>
</div>

<div class="card">
<div>تم تنفيذها</div>
<div class="number">0</div>
</div>

<div class="card">
<div>قيد التنفيذ</div>
<div class="number">0</div>
</div>

<div class="card">
<div>المتبقي</div>
<div class="number">0</div>
</div>

</div>

<div class="section">

<h2>قائمة المهام</h2>

<table>

<thead>
<tr>
<th>المهمة</th>
<th>المرحلة</th>
<th>الأسبوع</th>
<th>المطور</th>
<th>الحالة</th>
<th>نسبة الإنجاز</th>
</tr>
</thead>

<tbody>

<tr>
<td>Timeline Editor</td>
<td>Phase 5</td>
<td>12-15</td>
<td></td>
<td>Pending</td>
<td>0%</td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
