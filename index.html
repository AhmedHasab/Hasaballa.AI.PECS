<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hasaballa AI PECS</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#111827;
    color:white;
    padding:20px;
}

h1{
    margin:0;
}

.container{
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.number{
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
}

.section{
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:right;
}

th{
    background:#111827;
    color:white;
}

</style>
</head>

<body>

<header>
    <h1>Hasaballa AI PECS</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<div>إجمالي المهام</div>
<div class="number">0</div>
</div>

<div class="card">
<div>تم تنفيذها</div>
<div class="number">0</div>
</div>

<div class="card">
<div>قيد التنفيذ</div>
<div class="number">0</div>
</div>

<div class="card">
<div>المتبقي</div>
<div class="number">0</div>
</div>

</div>

<div class="section">

<h2>قائمة المهام</h2>

<table>

<thead>
<tr>
<th>المهمة</th>
<th>المرحلة</th>
<th>الأسبوع</th>
<th>المطور</th>
<th>الحالة</th>
<th>نسبة الإنجاز</th>
</tr>
</thead>

<tbody id="tasksTable">
</tbody>

</table>

</div>

</div>

<script>

async function loadTasks(){

    const response = await fetch('data/tasks.json');
    const tasks = await response.json();

    const table = document.getElementById('tasksTable');

    table.innerHTML = '';

    let total = tasks.length;
    let completed = 0;
    let inProgress = 0;

    tasks.forEach(task => {

        if(task.status === "Completed"){
            completed++;
        }

        if(task.status === "In Progress"){
            inProgress++;
        }

        table.innerHTML += `
        <tr>
            <td>${task.title}</td>
            <td>${task.phase}</td>
            <td>${task.week}</td>
            <td>${task.developer}</td>
            <td>${task.status}</td>
            <td>${task.progress}%</td>
        </tr>
        `;
    });

    document.querySelectorAll('.number')[0].innerText = total;
    document.querySelectorAll('.number')[1].innerText = completed;
    document.querySelectorAll('.number')[2].innerText = inProgress;
    document.querySelectorAll('.number')[3].innerText = total - completed;

}

loadTasks();

</script>
    
</body>
</html>
