<style>

:root{
--bg:#f4f6f9;
--card:#ffffff;
--primary:#07152d;
--accent:#16a34a;
--warning:#facc15;
--border:#d8dce3;
--text:#111827;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

.container{
width:98%;
margin:auto;
padding:15px;
}

.header{
background:var(--primary);
color:white;
padding:18px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
font-size:34px;
font-weight:800;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:var(--shadow);
}

.stat-title{
font-size:18px;
margin-bottom:10px;
}

.stat-number{
font-size:42px;
font-weight:800;
}

.filters{
background:white;
padding:20px;
border-radius:12px;
box-shadow:var(--shadow);
margin-bottom:20px;
display:grid;
grid-template-columns:
2fr
1fr
1fr
1fr
1fr;
gap:12px;
}

.filters input,
.filters select{
padding:12px;
border:1px solid var(--border);
border-radius:8px;
font-size:15px;
}

.table-container{
background:white;
border-radius:12px;
box-shadow:var(--shadow);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1700px;
}

thead{
background:var(--primary);
color:white;
}

th{
padding:15px;
border:1px solid #1c2847;
font-size:16px;
}

td{
padding:12px;
border:1px solid #e5e7eb;
text-align:center;
}

.task-title{
font-weight:700;
}

.task-type{
font-weight:700;
color:#2563eb;
}

.progress{
width:100%;
height:18px;
background:#ddd;
border-radius:30px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#22c55e;
}

.completed-row{
background:#ececec;
border-top:3px solid #ffd700;
border-bottom:3px solid #ffd700;
}

.note-input{

padding:8px;
border:1px solid #ccc;

select.dev-select{

.expand-btn{

.sub-row{
background:#f9fafb;

.sub-row td{
padding:20px;
}

.section-title{
font-size:24px;
font-weight:800;
margin:25px 0 15px;
}

@media(max-width:1200px){

.stats-grid{
grid-template-columns:repeat(2,1fr);
}

.filters{
grid-template-columns:1fr;
}

}

<script>

<body>

<div class="container">

<th>الأسبوع</th>

</tbody>

Weekly Reports
</div>

<script>



let tasks=[];
let subtasks=[];
let masterTasks=[];
let mappings=[];
let reports=[];
let dailyReports=[];
let developers=[];
let phases=[];
let milestones=[];

// =========================
// PART 2 START
// LOAD ALL JSON FILES
// =========================

async function loadAllData(){

try{

const [
tasksRes,
subtasksRes,
masterRes,
mappingRes,
reportsRes,
dailyRes,
developersRes,
phasesRes,
milestonesRes

] = await Promise.all([

fetch('./data/tasks.json'),
fetch('./data/subtasks.json'),
fetch('./data/master_tasks.json'),
fetch('./data/mappings.json'),
fetch('./data/reports.json'),
fetch('./data/daily_reports.json'),
fetch('./data/developers.json'),
fetch('./data/phases.json'),
fetch('./data/milestones.json')

]);

tasks = await tasksRes.json();
subtasks = await subtasksRes.json();
masterTasks = await masterRes.json();
mappings = await mappingRes.json();
reports = await reportsRes.json();
dailyReports = await dailyRes.json();
developers = await developersRes.json();
phases = await phasesRes.json();
milestones = await milestonesRes.json();

populateFilters();

renderDashboard();

renderTasks();

renderWeeklyReports();

renderDailyReports();

updateLastSync();

}
catch(error){

console.error(error);

alert(
'Error Loading JSON Files'
);

}

}

function updateLastSync(){

const now = new Date();

document.getElementById('lastSync').innerHTML =
'آخر تحديث : ' +
now.toLocaleString('ar-EG');

}

// =========================
// FILTERS
// =========================

function populateFilters(){

const phaseFilter =
document.getElementById('phaseFilter');

const taskTypeFilter =
document.getElementById('taskTypeFilter');

const phaseSet = new Set();

const typeSet = new Set();

tasks.forEach(task=>{

if(task.phase){

phaseSet.add(task.phase);

}

if(task.task_type){

typeSet.add(task.task_type);

}

});

[...phaseSet].forEach(phase=>{

phaseFilter.innerHTML +=
`<option value="${phase}">
${phase}
</option>`;

});

[...typeSet].forEach(type=>{

taskTypeFilter.innerHTML +=
`<option value="${type}">
${type}
</option>`;

});

}

// =========================
// DASHBOARD
// =========================

function renderDashboard(){

const total = tasks.length;

const completed =
tasks.filter(
t =>
t.progress == 100 ||
t.status === 'Completed'
).length;

const progress =
tasks.filter(
t =>
t.status === 'In Progress'
).length;

const remaining =
total - completed;

document.getElementById(
'totalTasks'
).innerText = total;

document.getElementById(
'completedTasks'
).innerText = completed;

document.getElementById(
'progressTasks'
).innerText = progress;

document.getElementById(
'remainingTasks'
).innerText = remaining;

}

// =========================
// TASK TABLE
// =========================

function renderTasks(){

const tbody =
document.getElementById(
'tasksTableBody'
);

tbody.innerHTML='';

tasks.forEach(task=>{

const row = document.createElement('tr');

if(task.progress == 100){

row.classList.add(
'completed-row'
);

}

row.innerHTML = `

<td>

<input
type="checkbox"
class="task-checkbox"
data-id="${task.id}"
${task.progress == 100 ? 'checked' : ''}
>

</td>

<td class="task-title">

<span
class="expand-btn"
onclick="toggleSubtasks('${task.id}')"
>
+
</span>

${task.title || '-'}

</td>

<td>

<span class="task-type">

${task.task_type || '-'}

</span>

</td>

<td>

${task.phase || '-'}

</td>

<td>

${task.week || '-'}

</td>

<td>

<select
class="dev-select"
data-id="${task.id}"
>

<option value="Rini" ${task.developer==="Rini"?"selected":""}>Rini</option>

<option value="Dhruvi" ${task.developer==="Dhruvi"?"selected":""}>Dhruvi</option>

<option value="Charvina" ${task.developer==="Charvina"?"selected":""}>Charvina</option>

<option value="Parth" ${task.developer==="Parth"?"selected":""}>Parth</option>

<option value="Others" ${task.developer==="Others"?"selected":""}>Others</option>

</select>

<option>
Rini
</option>

<option>
Dhruvi
</option>

<option>
Charvina
</option>

<option>
Parth
</option>

<option>
Others
</option>

</select>

</td>

<td>

${task.status || '-'}

</td>

<td>

<div class="progress">

<div
class="progress-bar"
style="width:${task.progress || 0}%">
</div>

</div>

${task.progress || 0}%

</td>

<td>

<input
class="note-input"
data-id="${task.id}"
value="${task.notes || ''}"
>

</td>

`;

tbody.appendChild(row);

const subRow =
document.createElement('tr');

subRow.className =
'sub-row';

subRow.id =
'sub-' + task.id;

subRow.innerHTML =

`
<td colspan="9">

<div id="subtasks-${task.id}">

Loading...

</div>

</td>
`;

tbody.appendChild(subRow);

});

attachCheckboxEvents();

}

// =========================
// PART 2 END
// =========================
    
// =========================
// PART 3 START
// SUBTASKS + AUTO PROGRESS
// =========================

function toggleSubtasks(taskId){

const row =
document.getElementById(
'sub-' + taskId
);

const container =
document.getElementById(
'subtasks-' + taskId
);

if(
row.style.display === 'table-row'
){

row.style.display = 'none';

return;

}

const relatedSubtasks =
subtasks.filter(st => {

return (
st.parent_task === taskId ||
st.parent_task === taskId.replace('DEV','T')
);

});

let html = '';

if(
relatedSubtasks.length === 0
){

html =
`
<div>

لا توجد مهام فرعية مرتبطة

</div>
`;

}
else{

html += `

<table
style="
width:100%;
margin-top:10px;
background:white;
"
>

<thead>

<tr>

<th>✓</th>

<th>Sub Task</th>

<th>Task Type</th>

<th>Phase</th>

<th>Status</th>

</tr>

</thead>

<tbody>

`;

relatedSubtasks.forEach(st=>{

html += `

<tr>

<td>

<input
type="checkbox"
class="subtask-checkbox"
data-id="${st.id}"
${st.status === 'Completed'
? 'checked'
: ''
}
>

</td>

<td>

${st.title}

</td>

<td>

${st.task_type || '-'}

</td>

<td>

${st.phase || '-'}

</td>

<td>

${st.status || '-'}

</td>

</tr>

`;

});

html += `

</tbody>
</table>

`;

}

container.innerHTML = html;

row.style.display = 'table-row';

attachSubtaskEvents();

}

// =========================
// SUBTASK EVENTS
// =========================

function attachSubtaskEvents(){

document
.querySelectorAll(
'.subtask-checkbox'
)
.forEach(box=>{

box.addEventListener(
'change',
function(){

const id =
this.dataset.id;

const subtask =
subtasks.find(
s => s.id === id
);

if(!subtask)
return;

if(this.checked){

subtask.status =
'Completed';

}
else{

const confirmRemove =
confirm(
'هل أنت متأكد من إزالة الإنجاز؟'
);

if(!confirmRemove){

this.checked = true;

return;

}

subtask.status =
'Not Started';

}

updateParentProgress();

}

);

});

}

// =========================
// PARENT PROGRESS
// =========================

function updateParentProgress(){

tasks.forEach(task=>{

const related =
subtasks.filter(st=>{

return (
st.parent_task === task.id
);

});

if(
related.length === 0
){

return;

}

const completed =
related.filter(st=>{

return st.status === 'Completed';

}).length;

const percent =
Math.round(
(
completed /
related.length
) * 100
);

task.progress =
percent;

if(percent === 100){

task.status =
'Completed';

}
else if(percent > 0){

task.status =
'In Progress';

}
else{

task.status =
'Not Started';

}

});

renderDashboard();

renderTasks();

}

// =========================
// MAIN CHECKBOX
// =========================

function attachCheckboxEvents(){

document
.querySelectorAll(
'.task-checkbox'
)
.forEach(box=>{

box.addEventListener(
'change',
function(){

const id =
this.dataset.id;

const task =
tasks.find(
t => t.id == id
);

if(!task)
return;

if(this.checked){

task.progress = 100;

task.status =
'Completed';

}
else{

const answer =
confirm(
'هل أنت متأكد من إلغاء الإنجاز؟'
);

if(!answer){

this.checked = true;

return;

}

task.progress = 0;

task.status =
'Not Started';

}

renderDashboard();

renderTasks();

}

);

});

}

// =========================
// PART 3 END
// =========================

// =========================
// PART 4 START
// REPORTS + FILTERS + SEARCH
// =========================

function renderWeeklyReports(){

const container =
document.getElementById(
'weeklyReports'
);

if(!container) return;

let html = '';

reports.forEach(report=>{

html += `

<div
style="
background:white;
padding:15px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
">

<h3>

${report.week || '-'}

</h3>

<div>

${report.period || ''}

</div>

<div>

${report.summary || ''}

</div>

<div>

Status:
<b>

${report.status || '-'}

</b>

</div>

</div>

`;

});

container.innerHTML = html;

}

// =========================
// DAILY REPORTS
// =========================

function renderDailyReports(){

const container =
document.getElementById(
'dailyReports'
);

if(!container) return;

let html = '';

dailyReports.forEach(report=>{

html += `

<div
style="
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
">

<h4>

${report.date || '-'}

</h4>

<div>

${report.developer || '-'}

</div>

<div>

${report.summary || '-'}

</div>

</div>

`;

});

container.innerHTML = html;

}

// =========================
// SEARCH
// =========================

document
.getElementById(
'searchBox'
)
.addEventListener(
'input',
applyFilters
);

// =========================
// FILTER EVENTS
// =========================

document
.getElementById(
'phaseFilter'
)
.addEventListener(
'change',
applyFilters
);

document
.getElementById(
'developerFilter'
)
.addEventListener(
'change',
applyFilters
);

document
.getElementById(
'statusFilter'
)
.addEventListener(
'change',
applyFilters
);

document
.getElementById(
'taskTypeFilter'
)
.addEventListener(
'change',
applyFilters
);

// =========================
// FILTER LOGIC
// =========================

function applyFilters(){

const search =
document
.getElementById(
'searchBox'
)
.value
.toLowerCase();

const phase =
document
.getElementById(
'phaseFilter'
)
.value;

const developer =
document
.getElementById(
'developerFilter'
)
.value;

const status =
document
.getElementById(
'statusFilter'
)
.value;

const taskType =
document
.getElementById(
'taskTypeFilter'
)
.value;

const rows =
document.querySelectorAll(
'#tasksTableBody tr'
);

rows.forEach(row=>{

if(
row.classList.contains(
'sub-row'
)
)
return;

const text =
row.innerText
.toLowerCase();

let visible = true;

if(
search &&
!text.includes(search)
){

visible = false;

}

if(
phase &&
!text.includes(
phase.toLowerCase()
)
){

visible = false;

}

if(
developer &&
!text.includes(
developer.toLowerCase()
)
){

visible = false;

}

if(
status &&
!text.includes(
status.toLowerCase()
)
){

visible = false;

}

if(
taskType &&
!text.includes(
taskType.toLowerCase()
)
){

visible = false;

}

row.style.display =
visible
? ''
: 'none';

});

}

// =========================
// TASK COUNTERS REFRESH
// =========================

function refreshCounters(){

const visibleRows =
[
...document.querySelectorAll(
'#tasksTableBody tr'
)
]
.filter(r=>{

return !r.classList.contains(
'sub-row'
);

});

let completed = 0;
let progress = 0;

visibleRows.forEach(row=>{

const text =
row.innerText;

if(
text.includes(
'Completed'
)
){

completed++;

}

if(
text.includes(
'In Progress'
)
){

progress++;

}

});

document
.getElementById(
'completedTasks'
)
.innerText =
completed;

document
.getElementById(
'progressTasks'
)
.innerText =
progress;

}

// =========================
// PART 4 END
// =========================
 
// =========================
// PART 5 START
// LOCAL SAVE + SUPABASE READY
// =========================

// ملاحظة:
// لو لم تضع بيانات Supabase بعد
// سيعمل النظام على LocalStorage تلقائياً

const STORAGE_KEY =
'hasaballa_ai_pecs_state';

// =========================
// SAVE STATE
// =========================

function saveState(){

const data = {

tasks,
subtasks

};

localStorage.setItem(
STORAGE_KEY,
JSON.stringify(data)
);

}

// =========================
// LOAD STATE
// =========================

function loadState(){

const saved =
localStorage.getItem(
STORAGE_KEY
);

if(!saved)
return;

try{

const data =
JSON.parse(saved);

if(data.tasks){

tasks = data.tasks;

}

if(data.subtasks){

subtasks = data.subtasks;

}

}
catch(err){

console.error(err);

}

}

// =========================
// NOTES SAVE
// =========================

document.addEventListener(
'input',
function(e){

if(
e.target.classList.contains(
'note-input'
)
){

const id =
e.target.dataset.id;

const task =
tasks.find(
t=>t.id==id
);

if(task){

task.notes =
e.target.value;

saveState();

}

}

}
);

// =========================
// DEVELOPER SAVE
// =========================

document.addEventListener(
'change',
function(e){

if(
e.target.classList.contains(
'dev-select'
)
){

const id =
e.target.dataset.id;

const task =
tasks.find(
t=>t.id==id
);

if(task){

task.developer =
e.target.value;

saveState();

}

}

}
);

// =========================
// OVERRIDE PROGRESS SAVE
// =========================

const originalUpdate =
updateParentProgress;

updateParentProgress =
function(){

originalUpdate();

saveState();

};

// =========================
// OVERRIDE CHECKBOX SAVE
// =========================

const originalAttach =
attachCheckboxEvents;

attachCheckboxEvents =
function(){

originalAttach();

document
.querySelectorAll(
'.task-checkbox'
)
.forEach(box=>{

box.addEventListener(
'change',
saveState
);

});

};

// =========================
// SUPABASE
// =========================

async function saveToSupabase(){

if(
!SUPABASE_URL ||
!SUPABASE_KEY
){

return;

}

try{

await fetch(

SUPABASE_URL +
'/rest/v1/project_state',

{

method:'POST',

headers:{

'apikey':
SUPABASE_KEY,

'Authorization':
'Bearer ' +
SUPABASE_KEY,

'Content-Type':
'application/json'

},

body:JSON.stringify({

tasks,
subtasks,
updated_at:
new Date()
.toISOString()

})

}

);

}
catch(error){

console.error(
'Supabase Save Error',
error
);

}

}

// =========================
// AUTO SAVE
// =========================

setInterval(()=>{

saveState();

saveToSupabase();

},10000);

// =========================
// AUTO REFRESH DASHBOARD
// =========================

setInterval(()=>{

renderDashboard();

},5000);

// =========================
// START APP
// =========================

(async ()=>{

await loadAllData();

loadState();

renderDashboard();

renderTasks();

renderWeeklyReports();

renderDailyReports();

})();

// =========================
// PART 5 END
// =========================
 </script>
</body>
</html>
